version: "3.9"

networks:
  red-proyecto:
    external: true   # usa la red ya creada arriba

services:

  # ── SERVIDOR PRINCIPAL ──────────────────────────────────────────
  servidor:
    build:
      context: ./servidor
      dockerfile: Dockerfile
    container_name: srv-redes
    hostname: servidor
    networks:
      red-proyecto:
        ipv4_address: 172.20.0.10   # ← IP fija propia (no localhost)
    ports:
      - "2222:22"   # SSH expuesto al host
      - "8080:80"   # Web (Apache/Nginx)
    volumes:
      - vol-datos:/datos
      - vol-respaldos:/respaldos
      - ./logs:/var/log/proyecto
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN   # necesario para cuotas y montajes internos

  # ── CLIENTE ─────────────────────────────────────────────────────
  cliente:
    build:
      context: ./cliente
      dockerfile: Dockerfile
    container_name: cli-redes
    hostname: cliente
    networks:
      red-proyecto:
        ipv4_address: 172.20.0.20
    depends_on:
      - servidor
    restart: unless-stopped

  # ── MONITOR (Prometheus + Grafana) ──────────────────────────────
  monitor:
    image: prom/prometheus:latest
    container_name: monitor-redes
    hostname: monitor
    networks:
      red-proyecto:
        ipv4_address: 172.20.0.30
    ports:
      - "9090:9090"
    volumes:
      - ./monitor/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-redes
    networks:
      red-proyecto:
        ipv4_address: 172.20.0.40
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - vol-grafana:/var/lib/grafana
    restart: unless-stopped

volumes:
  vol-datos:
  vol-respaldos:
  vol-grafana: